-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Version: 1.1.0 (Smart Router Payload Handling) -->
    <title>Vibe Coder - The Everything Agency</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 95vh; margin: 10px; background-color: #f0f2f5; }
        #chat-container { display: flex; flex-direction: column; flex-grow: 1; max-width: 800px; width: 100%; margin: 0 auto; border: 1px solid #ddd; background-color: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        #messages { list-style-type: none; padding: 20px; margin: 0; overflow-y: scroll; flex-grow: 1; }
        #messages li { margin-bottom: 12px; display: flex; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .user { background-color: #007bff; color: white; margin-left: auto; }
        .ai { background-color: #e9e9eb; color: #1c1e21; margin-right: auto; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: monospace; background-color: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; margin-top: 10px; }
        #form { display: flex; padding: 15px; border-top: 1px solid #ddd; }
        #input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 18px; font-size: 16px; }
        button { padding: 12px 20px; margin-left: 10px; border: none; background-color: #007bff; color: white; border-radius: 18px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background-color: #9db2bf; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="chat-container">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Ask your AI Project Manager..." />
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const submitButton = form.querySelector('button');

        const BACKEND_API_URL = 'https://idx-vibe-agent-backend-38793350-534939227554.australia-southeast1.run.app/api/chat';

        // --- Core UI Functions ---
        function addMessage(text, sender) {
            const li = document.createElement('li');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            li.appendChild(messageDiv);
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            return messageDiv;
        }

        function addFormattedCode(code) {
            const li = document.createElement('li');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.textContent = "Here is the component you requested:";
            const pre = document.createElement('pre');
            pre.textContent = code;
            messageDiv.appendChild(pre);
            li.appendChild(messageDiv);
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            return messageDiv;
        }
        
        // --- Form Submission Logic ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = input.value.trim();
            if (!userInput) return;

            addMessage(userInput, 'user');
            input.value = '';
            submitButton.disabled = true;
            
            const thinkingMessage = addMessage('Thinking...', 'ai');

            try {
                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userInput }),
                });

                thinkingMessage.parentElement.removeChild(thinkingMessage); // Remove "Thinking..."

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.details || `Request failed with status ${response.status}`);
                }

                const data = await response.json();

                // --- THE FIX: Handle the new response format ---
                switch(data.type) {
                    case 'component_code':
                        addFormattedCode(data.payload);
                        break;
                    case 'artifact':
                    case 'chat':
                        addMessage(data.payload, 'ai');
                        break;
                    default:
                        throw new Error(`Unknown response type: ${data.type}`);
                }
                // --- END OF FIX ---

            } catch (error) {
                console.error('Error:', error);
                // Ensure "Thinking..." is removed even on error
                if (thinkingMessage.parentElement) {
                    thinkingMessage.parentElement.removeChild(thinkingMessage);
                }
                addMessage(`Error: Could not connect to the AI Project Manager. Details: ${error.message}`, 'ai');
            } finally {
                submitButton.disabled = false;
            }
        });

        // Add a welcome message
        addMessage("Hello! I am your AI Project Manager. How can I help you build today?", 'ai');
    </script>

</body>
</html>
