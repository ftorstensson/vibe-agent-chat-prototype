<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coder - POC</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 95vh; margin: 10px; background-color: #f4f4f9; }
        h1, h2 { text-align: center; color: #333; }
        .container { border: 1px solid #ddd; background-color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        #form { display: flex; margin-top: 10px; }
        #input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px 0 0 8px; }
        button { padding: 10px 15px; border: 1px solid #ccc; border-left: none; background-color: #007bff; color: white; border-radius: 0 8px 8px 0; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; }
        #component-output { margin-top: 15px; background-color: #e9e9eb; border-radius: 8px; padding: 15px; white-space: pre-wrap; font-family: monospace; min-height: 50px; }
    </style>
</head>
<body>

    <h1>Vibe Coder - Multi-Agent Proof of Concept</h1>
    
    <div class="container">
        <h2>Component Builder Agent</h2>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Describe a component (e.g., 'a red cancel button')" />
            <button type="submit">Build Component</button>
        </form>
        <h3>Generated Component Code:</h3>
        <pre id="component-output">(Code will appear here)</pre>
    </div>

    <script>
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const output = document.getElementById('component-output');
        const submitButton = form.querySelector('button');

        // The live URL of our Python Backend Bridge
        const BACKEND_API_URL = '/api/build-component';

        async function getAIComponent(description) {
            // 1. Disable the button and show a "thinking" message
            submitButton.disabled = true;
            output.textContent = 'Agent is thinking...';
            
            try {
                // 2. Call our Python Backend Bridge
                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    // The backend expects a JSON object with a "description" key
                    body: JSON.stringify({ description: description }),
                });

                // 3. Check if the network request itself was successful
                if (!response.ok) {
                    // Get more details from the backend's error message if possible
                    const errorData = await response.json().catch(() => ({})); // Gracefully handle non-json errors
                    const errorMessage = errorData.details || `Error from backend: ${response.statusText}`;
                    throw new Error(`Network response was not ok. Status: ${response.status}. Details: ${errorMessage}`);
                }

                // 4. Parse the JSON response from the backend
                const data = await response.json();
                
                // 5. Display the component code returned by the agent
                output.textContent = data.componentCode;

            } catch (error) {
                // 6. Display any errors that occur during the process
                console.error('Error fetching component:', error);
                output.textContent = `An error occurred: ${error.message}`;
            } finally {
                // 7. Re-enable the button regardless of success or failure
                submitButton.disabled = false;
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                getAIComponent(input.value);
            }
        });
    </script>

</body>
</html>
